dataset_name: captaincook_error_dataset
train_split: ['train']
val_split: ['val']
dataset: {
  json_file: ./captaincook_actionformer_annotations/combined/recordings.json,
  feat_folder: ./data/egovlp_features,
  file_prefix: ~,
  file_ext: .npz,
  num_classes: 73,
  input_dim: 768,
  feat_stride: 16,
  num_frames: 16,
  default_fps: 1.876,
  trunc_thresh: 0.3,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 4096,
}
model: {
  #Using the optimized bins calculated from the training set of captaincook4D
  regression_range: [
    [0, 26], 
    [26, 49], 
    [49, 79], 
    [79, 141], 
    [141, 281], 
    [281, 10000]
  ],
  fpn_type: identity,
  backbone_arch: [2, 2, 7],
  max_buffer_len_factor: 4.0,
  n_mha_win_size: 9,
  embd_dim: 384,
  fpn_dim: 384,
  head_dim: 384,
  use_abs_pe: true,
}
opt: {
  learning_rate: 0.0001,
  epochs: 10,
  weight_decay: 0.05,
}
loader: {
  batch_size: 2,
}
train_cfg: {
  init_loss_norm: 100,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  dropout: 0.1,
  droppath: 0.1,
}
test_cfg: {
  pre_nms_topk: 5000,
  max_seg_num: 2000,
  min_score: 0.001,
  nms_sigma: 0.9,
  multiclass_nms: True,
  voting_thresh: 0.95,
}
output_folder: ./ckpt/